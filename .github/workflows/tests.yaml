name: Tests

on:
  push:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # finns nyare versioner, kolla upp!!

      - name: Set up Python
        uses: actions/setup-python@v4 # samma här
        with:
          python-version: "3.12" #samma här
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run All Tests
        run: pytest -v
